name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and Test graphify-plugin
        run: cd graphify-plugin && ./gradlew build

      - name: Publish graphify-plugin to MavenLocal
        run: cd graphify-plugin && ./gradlew publishToMavenLocal

      - name: Verify integrated chain — scanWorkspace + verifyDagAcyclic
        run: ./gradlew scanAndVerify
